<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANH TIẾN</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body{background:#0f172a;color:white}
.app-card{transition:.3s}.app-card:hover{transform:translateY(-5px)}
</style>
</head>
<body>

<header class="bg-slate-900 p-4 text-center text-2xl font-bold">
TNETZ Store
</header>

<section class="p-10 text-center bg-gradient-to-r from-green-600 to-emerald-500">
<h1 class="text-5xl font-black mb-4">Kho Ứng Dụng</h1>
<p>Tải APK, EXE và công cụ của bạn</p>
</section>

<div class="max-w-6xl mx-auto p-4">
<input id="searchInput" class="w-full p-3 rounded text-black" placeholder="Tìm kiếm ứng dụng...">
</div>

<div class="max-w-6xl mx-auto px-4 flex gap-2 mb-4">
<button onclick="filterOS('all')" class="bg-green-600 px-4 py-2 rounded">Tất cả</button>
<button onclick="filterOS('android')" class="bg-slate-700 px-4 py-2 rounded">Android</button>
<button onclick="filterOS('windows')" class="bg-slate-700 px-4 py-2 rounded">Windows</button>
</div>

<div id="appList" class="max-w-6xl mx-auto grid md:grid-cols-3 gap-5 p-4"></div>

<div id="appModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
<div class="bg-slate-900 p-6 rounded-3xl max-w-lg w-full relative">
<button onclick="closeApp()" class="absolute right-4 top-4 text-2xl">✕</button>
<div id="appDetail"></div>
</div>
</div>

<script>
let currentFilter='all';

let allApps=[{
id:1,
appName:'VPN Siêu Cấp',
version:'2.5.0',
os:'android',
size:28500000,
downloads:15420,
logoFilename:'https://picsum.photos/200?1'
}];

function renderApps(search=''){
const list=document.getElementById('appList');
list.innerHTML='';

allApps.filter(app=>{
return (currentFilter==='all'||app.os===currentFilter)
&& app.appName.toLowerCase().includes(search.toLowerCase());
}).forEach(app=>{
list.innerHTML+=`
<div onclick="openApp('${app.id}')"
class="app-card bg-slate-800 rounded-3xl overflow-hidden cursor-pointer">

<div class="h-32 bg-gradient-to-r from-green-500 to-emerald-400"></div>

<div class="p-5">
<div class="flex gap-3 -mt-10">
<img src="${app.logoFilename}" class="w-20 h-20 rounded-2xl border-4 border-slate-800">
<div>
<h3 class="font-bold text-lg">${app.appName}</h3>
<p class="text-green-400">v${app.version}</p>
</div>
</div>

<div class="flex justify-between mt-4 text-sm text-slate-400">
<span>📦 ${formatBytes(app.size)}</span>
<span>📥 ${app.downloads}</span>
</div>
</div>
</div>`;
});
}

function openApp(id){
const app=allApps.find(x=>x.id==id);

document.getElementById('appDetail').innerHTML=`
<div class="text-center">
<img src="${app.logoFilename}" class="w-28 h-28 rounded-3xl mx-auto mb-4">
<h2 class="text-2xl font-bold">${app.appName}</h2>
<p class="text-green-400 mb-4">Version ${app.version}</p>

<img src="https://picsum.photos/700/350"
class="rounded-2xl mb-4">

<p class="text-slate-300 mb-5">
Ứng dụng demo. Thay dữ liệu bằng API hoặc cơ sở dữ liệu của bạn.
</p>

<a href="#"
class="block bg-green-600 py-3 rounded-xl font-bold">
Cài Đặt Ngay
</a>
</div>`;

document.getElementById('appModal').classList.remove('hidden');
}

function closeApp(){
document.getElementById('appModal').classList.add('hidden');
}

function filterOS(os){
currentFilter=os;
renderApps(document.getElementById('searchInput').value);
}

function formatBytes(bytes){
const k=1024;
const sizes=['B','KB','MB','GB'];
const i=Math.floor(Math.log(bytes)/Math.log(k));
return (bytes/Math.pow(k,i)).toFixed(1)+' '+sizes[i];
}

document.getElementById('searchInput')
.addEventListener('input',e=>renderApps(e.target.value));

renderApps();
</script>

</body>
</html>
