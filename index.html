<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TNETZ Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

html{
scroll-behavior:smooth;
}

body{
background:#0f172a;
color:white;
}

.hero-bg{
background:
linear-gradient(
135deg,
#16a34a 0%,
#22c55e 40%,
#0f172a 100%
);
}

.app-card{
transition:.3s;
}

.app-card:hover{
transform:translateY(-5px);
}

::-webkit-scrollbar{
height:5px;
width:5px;
}

::-webkit-scrollbar-thumb{
background:#22c55e;
border-radius:20px;
}

</style>
</head>

<body>

<!-- HEADER -->

<header
class="sticky top-0 z-50
bg-slate-900/80 backdrop-blur
border-b border-slate-800">

<div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">

<div class="flex items-center gap-3">

<i class="fa-brands fa-google-play text-green-500 text-2xl"></i>

<h1 id="siteTitle"
class="font-bold text-xl">
TNETZ Store
</h1>

</div>

<div class="hidden md:block w-full max-w-lg mx-10">

<div class="relative">

<input
id="searchInput"
type="text"
placeholder="Tìm kiếm ứng dụng..."
class="w-full bg-slate-800 rounded-full
pl-12 pr-4 py-3 outline-none">

<i
class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
</i>

</div>

</div>

<div>

<button
onclick="toggleTheme()"
class="w-10 h-10 rounded-full bg-slate-800">

🌙

</button>

</div>

</div>

</header>

<!-- HERO -->

<section class="hero-bg">

<div class="max-w-7xl mx-auto px-4 py-20">

<div class="max-w-3xl">

<h1
class="text-5xl md:text-6xl font-black mb-6">

Kho Ứng Dụng
TNETZ

</h1>

<p
class="text-lg text-white/90 mb-8">

Tải xuống APK, EXE, IPA,
các công cụ và ứng dụng mới nhất
được cập nhật mỗi ngày.

</p>

<div class="flex gap-4">

<a href="#apps"
class="bg-white text-green-700
px-6 py-3 rounded-xl font-bold">

Khám Phá

</a>

<a href="#stats"
class="border border-white
px-6 py-3 rounded-xl font-bold">

Thống Kê

</a>

</div>

</div>

</div>

</section>

<!-- STATS -->

<section
id="stats"
class="max-w-7xl mx-auto px-4 py-10">

<div
class="grid md:grid-cols-4 gap-5">

<div
class="bg-slate-800 rounded-3xl p-6 text-center">

<h2
id="appCount"
class="text-4xl font-black text-green-400">

0

</h2>

<p class="text-slate-400">
Ứng dụng
</p>

</div>

<div
class="bg-slate-800 rounded-3xl p-6 text-center">

<h2
id="downloadCount"
class="text-4xl font-black text-green-400">

0

</h2>

<p class="text-slate-400">
Lượt tải
</p>

</div>

<div
class="bg-slate-800 rounded-3xl p-6 text-center">

<h2
class="text-4xl font-black text-green-400">

24/7

</h2>

<p class="text-slate-400">
Online
</p>

</div>

<div
class="bg-slate-800 rounded-3xl p-6 text-center">

<h2
class="text-4xl font-black text-green-400">

100%

</h2>

<p class="text-slate-400">
Miễn phí
</p>

</div>

</div>

</section>

<!-- FILTER -->

<section
class="max-w-7xl mx-auto px-4">

<div
class="flex gap-3 overflow-auto pb-4">

<button onclick="filterOS('all')"
class="filter-btn bg-green-600 px-5 py-2 rounded-full">
Tất Cả
</button>

<button onclick="filterOS('android')"
class="filter-btn bg-slate-800 px-5 py-2 rounded-full">
Android
</button>

<button onclick="filterOS('ios')"
class="filter-btn bg-slate-800 px-5 py-2 rounded-full">
iOS
</button>

<button onclick="filterOS('windows')"
class="filter-btn bg-slate-800 px-5 py-2 rounded-full">
Windows
</button>

<button onclick="filterOS('macos')"
class="filter-btn bg-slate-800 px-5 py-2 rounded-full">
MacOS
</button>

</div>

</section>

<!-- APPS -->

<section
id="apps"
class="max-w-7xl mx-auto px-4 py-10">

<div
id="appList"
class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
</div>

<div
id="loading"
class="text-center py-20">

<i
class="fa-solid fa-spinner fa-spin text-4xl text-green-500">
</i>

<p class="mt-4">
Đang tải ứng dụng...
</p>

</div>

</section>

<!-- FOOTER -->

<footer
class="border-t border-slate-800 mt-20">

<div
class="max-w-7xl mx-auto px-4 py-10 text-center">

<h3
class="font-bold text-xl mb-3">

TNETZ Store

</h3>

<p
class="text-slate-400">

Nền tảng chia sẻ ứng dụng,
APK và công cụ miễn phí.

</p>

<div
class="flex justify-center gap-5 mt-5 text-2xl">

<a href="#">
<i class="fab fa-telegram"></i>
</a>

<a href="#">
<i class="fab fa-facebook"></i>
</a>

<a href="#">
<i class="fab fa-github"></i>
</a>

</div>

</div>

</footer>

<script>

let allApps = [];
let currentFilter = 'all';

async function loadApps(){

try{

const res = await fetch('/api/files');

allApps = await res.json();

document.getElementById('loading')
.style.display='none';

updateStats();

renderApps();

}catch(e){

document.getElementById('loading')
.innerHTML='Lỗi tải dữ liệu';

}

}

function updateStats(){

document.getElementById('appCount')
.innerText = allApps.length;

let total = 0;

allApps.forEach(app=>{

if(Array.isArray(app.downloads))
total += app.downloads.length;
else
total += app.downloads || 0;

});

document.getElementById('downloadCount')
.innerText = total.toLocaleString();

}

function renderApps(search=''){

const list =
document.getElementById('appList');

list.innerHTML='';

const apps =
allApps.filter(app=>{

const matchSearch =
(app.appName || '')
.toLowerCase()
.includes(search.toLowerCase());

const matchOS =
currentFilter==='all'
||
(app.os||'')
.toLowerCase()===currentFilter;

return matchSearch && matchOS;

});

apps.forEach(app=>{

list.innerHTML += `

<div
class="app-card bg-slate-800 rounded-3xl overflow-hidden border border-slate-700">

<div
class="h-36 bg-gradient-to-r from-green-600 to-emerald-400">
</div>

<div class="p-5">

<div class="flex gap-3 -mt-12">

<img
src="/uploads/${app.logoFilename}"
class="w-20 h-20 rounded-2xl border-4 border-slate-800 object-cover">

<div>

<h3
class="font-bold text-lg">

${app.appName}

</h3>

<p
class="text-green-400 text-sm">

v${app.version}

</p>

</div>

</div>

<div
class="flex justify-between mt-5 text-sm text-slate-400">

<span>
📦 ${formatBytes(app.size)}
</span>

<span>
📥 ${
Array.isArray(app.downloads)
? app.downloads.length
: (app.downloads || 0)
}
</span>

</div>

<div
class="grid grid-cols-2 gap-3 mt-5">

<a
href="/download/${app.id}"
class="bg-green-600 py-3 rounded-xl text-center font-bold">

Cài Đặt

</a>

<button
onclick="copyLink('${app.id}')"
class="bg-slate-700 py-3 rounded-xl">

Chia Sẻ

</button>

</div>

</div>

</div>

`;

});

}

function copyLink(id){

const url =
window.location.origin +
'/download/' +
id;

navigator.clipboard.writeText(url);

alert('Đã sao chép liên kết');

}

function filterOS(os){

currentFilter = os;

renderApps(
document.getElementById('searchInput').value
);

}

function formatBytes(bytes){

if(!bytes) return "0 MB";

const k = 1024;

const sizes =
['B','KB','MB','GB'];

const i =
Math.floor(
Math.log(bytes)/Math.log(k)
);

return (
bytes/Math.pow(k,i)
).toFixed(1)
+
' '
+
sizes[i];

}

document
.getElementById('searchInput')
.addEventListener('input',e=>{

renderApps(e.target.value);

});

function toggleTheme(){

document.body.classList.toggle('invert');

}

loadApps();

</script>

</body>
</html>
