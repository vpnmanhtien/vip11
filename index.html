<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ứng Dụng </title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f3f4f6}
.card{transition:.3s}
.card:hover{transform:translateY(-6px)}
</style>
</head>
<body>

<header class="bg-white shadow sticky top-0 z-50">
<div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
<h1 class="font-black text-2xl text-green-600">ỨNg Dụng</h1>
<input id="search" placeholder="Tìm ứng dụng..."
class="border rounded-xl px-4 py-2 w-72">
</div>
</header>

<div class="max-w-7xl mx-auto p-4">

<div class="flex gap-3 mb-6 overflow-auto">
<button onclick="filterApps('all')" class="bg-green-600 text-white px-5 py-2 rounded-full">Tất cả</button>
<button onclick="filterApps('android')" class="bg-white px-5 py-2 rounded-full">Android</button>
<button onclick="filterApps('ios')" class="bg-white px-5 py-2 rounded-full">iOS</button>
<button onclick="filterApps('windows')" class="bg-white px-5 py-2 rounded-full">Windows</button>
</div>

<div id="apps" class="grid md:grid-cols-4 sm:grid-cols-2 gap-8"></div>

</div>

<div id="modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
<div class="bg-white rounded-3xl max-w-3xl w-full overflow-hidden">
<div id="detail"></div>
</div>
</div>

<script>
let apps=[];

async function loadApps(){

    try{

        const response = await fetch('./app.json');

        if(!response.ok){
            throw new Error("Không tìm thấy app.json");
        }

        apps = await response.json();

        render();

    }catch(error){

        console.error(error);

        alert("Không tải được app.json");

    }

}

loadApps();
  
let current='all';

function render(){
const s=document.getElementById('search').value.toLowerCase();
const box=document.getElementById('apps');

box.innerHTML='';

apps.filter(a=>(current==='all'||a.os===current)&&a.name.toLowerCase().includes(s))
.forEach(app=>{
box.innerHTML+=`
<div class="card bg-white rounded-3xl p-6 shadow">
<img src="${app.logo}" class="w-28 h-28 mx-auto rounded-3xl shadow">
<h2 class="text-center font-bold text-2xl mt-4">${app.name}</h2>
<div class="text-center text-gray-500 mt-2">${app.os} · ${app.version}</div>

<button onclick="event.stopPropagation();openApp(${app.id})"
class="w-full mt-6 bg-green-600 text-white py-3 rounded-2xl font-bold">
Tải Xuống
</button>

<div class="flex justify-between mt-5 text-gray-500">
<span>${app.size}</span>
<span>⬇ ${app.downloads}</span>
</div>
</div>`;
});
}

function filterApps(os){
current=os;
render();
}

function openApp(id){
const app=apps.find(x=>x.id===id);

document.getElementById('detail').innerHTML=`
<img src="${app.banner}" class="w-full h-64 object-cover">

<div class="p-6">

<div class="flex gap-4 items-center">
<img src="${app.logo}" class="w-24 h-24 rounded-3xl">
<div>
<h2 class="text-3xl font-black">${app.name}</h2>
<p class="text-green-600">Version ${app.version}</p>
</div>
</div>

<div class="grid grid-cols-3 text-center mt-6">
<div><b>${app.size}</b><br>Dung lượng</div>
<div><b>${app.downloads}</b><br>Lượt tải</div>
<div><b>${app.os}</b><br>Nền tảng</div>
</div>

<h3 class="font-bold text-xl mt-8 mb-3">Ảnh chụp màn hình</h3>

<div class="flex gap-3 overflow-auto">
<img src="https://picsum.photos/300/600?a=${id}" class="rounded-2xl h-56">
<img src="https://picsum.photos/300/600?b=${id}" class="rounded-2xl h-56">
<img src="https://picsum.photos/300/600?c=${id}" class="rounded-2xl h-56">
</div>

<p class="mt-6 text-gray-600">
Ứng dụng demo. Khi kết nối API của bạn, dữ liệu thật sẽ hiển thị tại đây.
</p>

<div class="flex gap-3 mt-6">
<button class="flex-1 bg-green-600 text-white py-3 rounded-2xl font-bold">
CÀI ĐẶT NGAY
</button>

<button onclick="closeModal()"
class="px-6 bg-gray-200 rounded-2xl">
Đóng
</button>
</div>

</div>`;

document.getElementById('modal').classList.remove('hidden');
}

function closeModal(){
document.getElementById('modal').classList.add('hidden');
}

document.getElementById('search').addEventListener('input',render);
render();
</script>

</body>
</html>
