<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNETZ - App Store</title>
    <script src="/js/tailwindcss.js"></script>
    <link rel="stylesheet" href="/css/fontawesome.css">
    <style>
        body {
            background-color: #f3f4f6;
        }

        .app-card {
            transition: all 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="w-full mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-brands fa-google-play text-green-600 text-2xl"></i>
                <h1 id="siteTitle" class="text-xl font-bold text-gray-800">TNETZ Store</h1>
            </div>
            <div class="relative w-full max-w-md mx-4 hidden md:block">
                <input type="text" id="searchInput" placeholder="Tìm kiếm ứng dụng..."
                    class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-green-500 transition-all">
                <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            </div>
            <div class="text-xs text-gray-500">v2.0</div>
        </div>
        <!-- Mobile Search -->
        <div class="px-4 pb-3 md:hidden">
            <input type="text" id="mobileSearch" placeholder="Tìm kiếm..."
                class="w-full pl-4 pr-4 py-2 bg-gray-100 rounded-lg focus:outline-none">
        </div>
    </header>

    <!-- Filter Tags -->
    <div class="w-full mx-auto px-4 py-4 flex gap-2 overflow-x-auto no-scrollbar">
        <button onclick="filterOS('all')"
            class="bg-green-600 text-white px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap shadow-sm hover:bg-green-700 transition">Tất
            cả</button>
        <button onclick="filterOS('android')"
            class="bg-white text-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap border hover:bg-gray-50 transition"><i
                class="fa-brands fa-android mr-1"></i> Android</button>
        <button onclick="filterOS('ios')"
            class="bg-white text-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap border hover:bg-gray-50 transition"><i
                class="fa-brands fa-apple mr-1"></i> iOS</button>
        <button onclick="filterOS('windows')"
            class="bg-white text-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap border hover:bg-gray-50 transition"><i
                class="fa-brands fa-windows mr-1"></i> Windows</button>
        <button onclick="filterOS('macos')"
            class="bg-white text-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap border hover:bg-gray-50 transition"><i
                class="fa-brands fa-apple mr-1"></i> MacOS</button>
    </div>

    <!-- Main Content -->
    <main class="w-full mx-auto px-4 py-6">
        <div id="appList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- App Cards will be injected here -->
        </div>

        <div id="loading" class="text-center py-20 text-gray-400">
            <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
            <p>Đang tải ứng dụng...</p>
        </div>

        <div id="empty" class="hidden text-center py-20 text-gray-400">
            <i class="fa-solid fa-ghost text-4xl mb-3"></i>
            <p>Không tìm thấy ứng dụng nào</p>
        </div>
    </main>

    <script>
        let allApps = [];
        let currentFilter = 'all';

        async function loadApps() {
            try {
                const res = await fetch('/api/files');
                allApps = await res.json();
                document.getElementById('loading').classList.add('hidden');
                renderApps();
            } catch (e) {
                document.getElementById('loading').innerHTML = '<span class="text-red-500">Lỗi kết nối Server</span>';
            }
        }

        function renderApps(searchText = '') {
            const list = document.getElementById('appList');
            list.innerHTML = '';

            const filtered = allApps.filter(app => {
                const matchSearch = app.appName.toLowerCase().includes(searchText.toLowerCase());
                const matchOS = currentFilter === 'all' || app.os.toLowerCase() === currentFilter;
                return matchSearch && matchOS;
            });

            if (filtered.length === 0) {
                document.getElementById('empty').classList.remove('hidden');
            } else {
                document.getElementById('empty').classList.add('hidden');
            }

            filtered.forEach(app => {
                const osIcon = getOSIcon(app.os);
                const item = document.createElement('div');
                item.className = 'app-card bg-white rounded-2xl p-5 border border-gray-100 flex flex-col items-center text-center relative overflow-hidden';
                item.innerHTML = `
                    <div class="w-24 h-24 mb-4 rounded-2xl overflow-hidden shadow-md bg-gray-50 flex items-center justify-center">
                        <img src="/uploads/${app.logoFilename}" alt="${app.appName}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="font-bold text-gray-800 text-lg mb-1 line-clamp-1" title="${app.appName}">${app.appName}</h3>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded-md font-medium capitalize">
                            ${osIcon} ${app.os}
                        </span>
                        <span class="text-xs text-gray-400">v${app.version}</span>
                    </div>
                    <a href="/download/${app.id}" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-xl font-medium transition-colors shadow-sm active:scale-95 mb-2">
                        Tải Xuống
                    </a>
                    <button onclick="copyDownloadLink('${app.id}')" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 rounded-xl text-sm font-medium transition-colors active:scale-95">
                        <i class="fa-regular fa-copy mr-1"></i> Sao chép link
                    </button>
                    <div class="flex justify-between items-center w-full mt-3 px-1">
                        <span class="text-xs text-gray-400">${formatBytes(app.size)}</span>
                        <span class="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md flex items-center gap-1">
                            <i class="fa-solid fa-download text-green-600"></i> ${(Array.isArray(app.downloads) ? app.downloads.length : (app.downloads || 0))}
                        </span>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                return new Promise((res, rej) => {
                    document.execCommand('copy') ? res() : rej();
                    textArea.remove();
                });
            }
        }

        function copyDownloadLink(id) {
            const url = window.location.origin + '/download/' + id;
            copyToClipboard(url).then(() => {
                alert('Đã sao chép link tải xuống!');
            }).catch(err => {
                console.error('Lỗi copy:', err);
            });
        }

        function getOSIcon(os) {
            const low = os.toLowerCase();
            if (low === 'android') return '<i class="fa-brands fa-android"></i>';
            if (low === 'ios') return '<i class="fa-brands fa-apple"></i>';
            if (low === 'windows') return '<i class="fa-brands fa-windows"></i>';
            if (low === 'macos') return '<i class="fa-brands fa-apple"></i>';
            return '<i class="fa-solid fa-mobile-screen"></i>';
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function filterOS(os) {
            currentFilter = os;
            renderApps(document.getElementById('searchInput').value);

            // Update UI buttons (Simplified for this example)
            document.querySelectorAll('button').forEach(btn => {
                if (btn.innerText.toLowerCase().includes(os === 'all' ? 'tất cả' : os)) {
                    btn.className = "bg-green-600 text-white px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap shadow-sm transition";
                } else {
                    btn.className = "bg-white text-gray-700 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap border hover:bg-gray-50 transition";
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderApps(e.target.value));
        document.getElementById('mobileSearch').addEventListener('input', (e) => renderApps(e.target.value));

        loadApps();
    </script>

    <script>
        async function loadSiteSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                if (data.siteName) {
                    document.title = data.siteName;
                    const h1 = document.getElementById('siteTitle');
                    if (h1) h1.innerText = data.siteName;
                }

                if (data.contact) {
                    const c = data.contact;
                    const footer = document.getElementById('siteFooter');
                    let showFooter = false;

                    let html = '<div class="w-full max-w-7xl mx-auto px-4 py-12">';
                    html += '<div class="text-center mb-10">';
                    html += '<h2 class="text-2xl font-bold text-gray-800 mb-2" style="color: #6C5DD3;">Liên hệ hỗ trợ</h2>';
                    html += '<p class="text-gray-500 text-sm">Liên hệ với chúng tôi để được hỗ trợ nhanh chóng</p>';
                    html += '</div>';

                    html += '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 justify-center">';

                    const createCard = (iconHtml, colorClass, title, value, btnText, link, isLink = true) => {
                        return `<div class="bg-white rounded-2xl p-6 text-center border border-gray-100 shadow-sm hover:shadow-lg transition-all group flex flex-col items-center">
                            <div class="w-16 h-16 rounded-full ${colorClass} flex items-center justify-center mb-4 text-2xl text-white shadow-md">
                                ${iconHtml}
                            </div>
                            <h3 class="font-bold text-gray-800 text-lg mb-1" style="color: ${colorClass.includes('bg-sky') ? '#229ED9' : (colorClass.includes('bg-blue') ? '#0088CC' : (colorClass.includes('bg-green') ? '#25D366' : '#6C5DD3'))}">${title}</h3>
                            <p class="text-sm text-gray-500 mb-6 font-medium">${value}</p>
                            ${isLink ?
                                `<a href="${link}" target="_blank" class="w-full py-2.5 rounded-lg text-white text-sm font-bold transition shadow-sm hover:opacity-90 flex items-center justify-center gap-2" style="background-color: ${colorClass.includes('bg-sky') ? '#229ED9' : (colorClass.includes('bg-blue') ? '#0068FF' : (colorClass.includes('bg-green') ? '#25D366' : '#FF5722'))}">
                                    <i class="fa-solid fa-paper-plane"></i> ${btnText}
                                </a>` :
                                `<button onclick="navigator.clipboard.writeText('${link}'); alert('Đã copy ID!')" class="w-full py-2.5 rounded-lg text-white text-sm font-bold transition shadow-sm hover:opacity-90 flex items-center justify-center gap-2" style="background-color: #07C160">
                                    <i class="fa-regular fa-copy"></i> Copy ID
                                </button>`
                            }
                        </div>`;
                    };

                    if (c.telegram?.enabled && c.telegram.value) {
                        showFooter = true;
                        let href = c.telegram.value.startsWith('http') ? c.telegram.value : 'https://t.me/' + c.telegram.value;
                        html += createCard('<i class="fa-brands fa-telegram"></i>', 'bg-sky-500', 'Telegram', c.telegram.value, 'Nhắn Tin', href);
                    }

                    if (c.zalo?.enabled && c.zalo.value) {
                        showFooter = true;
                        let href = c.zalo.value.startsWith('http') ? c.zalo.value : 'https://zalo.me/' + c.zalo.value;
                        html += createCard('<span class="font-black font-sans text-xl">Z</span>', 'bg-blue-600', 'Zalo', c.zalo.value, 'Nhắn Tin', href);
                    }

                    if (c.wechat?.enabled && c.wechat.value) {
                        showFooter = true;
                        html += createCard('<i class="fa-brands fa-weixin"></i>', 'bg-green-500', 'WeChat', 'ID: ' + c.wechat.value, 'Copy ID', c.wechat.value, false);
                    }

                    if (c.hotline?.enabled && c.hotline.value) {
                        showFooter = true;
                        html += createCard('<i class="fa-solid fa-headset"></i>', 'bg-indigo-500', 'Hotline 24/7', c.hotline.value, 'Gọi Ngay', 'tel:' + c.hotline.value);
                    }

                    html += '</div></div>';
                    html += '<div class="bg-slate-50 py-6 text-center text-sm text-gray-400 border-t border-gray-100 mt-8">© 2026 TNETZ Store - All Rights Reserved</div>';

                    if (showFooter) {
                        footer.innerHTML = html;
                        footer.classList.remove('hidden');
                        footer.classList.remove('bg-white');
                    }
                }
            } catch (e) { console.error(e); }
        }
        loadSiteSettings();
    </script>

    <footer id="siteFooter" class="bg-white border-t border-gray-200 mt-12 hidden"></footer>
</body>

</html>
